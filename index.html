<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JergBuilder</title>
    <link rel="stylesheet" href="style.css">
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="splashScreen" class="overlay">
        <h2 class="studio-logo">Jergan Studio</h2>
    </div>

    <div id="mainMenu" class="overlay hidden">
        <h1>JergBuilder</h1>
        <div class="menu-buttons">
            <button id="btnWorlds">Worlds</button>
            <button id="btnSkins">Skins</button>
            <button id="btnMultiplayer" disabled>Multiplayer (Soon)</button>
        </div>
    </div>

    <div id="worldsMenu" class="overlay hidden">
        <h2>Select World</h2>
        <div class="menu-buttons">
            <button class="world-select" data-world="flat">Flat World</button>
            <button class="world-select" data-world="hills">Hilly World</button>
            <button class="btnBack">Back to Menu</button>
        </div>
    </div>

    <div id="skinsMenu" class="overlay hidden">
        <h2>Select Skin</h2>
        <div class="menu-buttons">
            <button class="skin-select" data-skin="default">Default Model</button>
            <button class="skin-select" data-skin="red">Red Team Skin</button>
            <button class="skin-select" data-skin="blue">Blue Team Skin</button>
            <button class="btnBack">Back to Menu</button>
        </div>
    </div>

    <div id="escMenu" class="overlay hidden">
        <h2>Game Paused</h2>
        <div class="menu-buttons">
            <button id="btnResume">Resume Game</button>
            <button id="btnQuit">Quit to Main Menu</button>
        </div>
    </div>

    <div id="hud" class="hidden">
        <div id="ui">
            Click window to look | WASD to Move | Press ESC to pause | Press ] to toggle View
            <br><br>
            <label for="blockColor" style="vertical-align: middle;">Block Color: </label>
            <input type="color" id="blockColor" value="#557a2b" style="vertical-align: middle; cursor: pointer;">
            <span style="margin-left: 10px;">Left-Click to PLACE block</span>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script type="module" defer src="./Js/main.js"></script>
</body>
</html>
