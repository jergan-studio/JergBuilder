<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>JergBuilder: JavaScript Edition</title>
    <link rel="stylesheet" href="style.css">
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>

    <div id="mainMenu" class="overlay">
        <h1 style="color: #4caf50; font-size: 3.5rem; margin-bottom: 5px; text-shadow: 3px 3px #1b431c;">JergBuilder</h1>
        <div style="color: #888; margin-bottom: 30px; font-size: 1.2rem; letter-spacing: 2px;">JAVASCRIPT EDITION</div>
        <div class="menu-buttons">
            <button id="btnWorlds">Worlds</button>
            <button id="btnSkins">Skins</button>
            <button id="btnMultiplayer" disabled style="opacity: 0.4; cursor: not-allowed;">Multiplayer (Soon)</button>
        </div>
    </div>

    <div id="worldsMenu" class="overlay hidden">
        <div class="split-container">
            <div class="menu-column">
                <h2 style="color: #4caf50; margin-bottom: 20px;">WORLDS</h2>
                <div class="menu-buttons" style="width: 100%;">
                    <button class="world-select" data-world="world1">📁 World 1</button>
                    <button class="world-select" data-world="world2">📁 World 2</button>
                    <button class="btnBack" style="margin-top: 40px; background-color: #444;">Back to Menu</button>
                </div>
            </div>

            <div class="divider"></div>

            <div class="menu-column">
                <h2 style="color: #4caf50; margin-bottom: 25px;">New Worlds</h2>
                <div class="setup-box">
                    <h3 style="margin: 0; font-size: 1.2rem; text-transform: uppercase;">New World</h3>
                    
                    <div class="input-group">
                        <label for="worldSeed">Seed:</label>
                        <input type="text" id="worldSeed" placeholder="00000000">
                    </div>

                    <div class="input-group">
                        <span>Mode:</span>
                        <div style="display: flex; gap: 10px;">
                            <button id="modeCreative" type="button" style="flex: 1; padding: 10px; background-color: #4caf50; color: black;">Creative</button>
                            <button id="modeSurvival" type="button" style="flex: 1; padding: 10px; background-color: #333; opacity: 0.5;">Survival</button>
                        </div>
                    </div>

                    <button id="btnCreateWorld" style="background-color: #4caf50; color: black; font-size: 1.3rem; margin-top: 10px; width: 100%;">[create]</button>
                </div>
            </div>
        </div>
    </div>

    <div id="skinsMenu" class="overlay hidden">
        <h2 style="color: #4caf50;">Select Skin</h2>
        <div class="menu-buttons">
            <button class="skin-select" data-skin="default">Default Model</button>
            <button class="skin-select" data-skin="red">Red Team Skin</button>
            <button class="skin-select" data-skin="blue">Blue Team Skin</button>
            <button id="btnCustomSkin" style="background-color: #5c3ca6;">+ Load Custom URL Skin</button>
            <button class="btnBack" style="background-color: #444;">Back to Menu</button>
        </div>
    </div>

    <div id="escMenu" class="overlay hidden">
        <h2 style="color: #f44336;">Game Paused</h2>
        <div class="menu-buttons">
            <button id="btnResume">Resume Game</button>
            <button id="btnQuit">Quit to Main Menu</button>
        </div>
    </div>

    <div id="hud" class="hidden">
        <div id="ui">
            Move: WASD | Look: Mouse Click | Pause: ESC
            <br><br>
            <span id="hudGamemodeDisplay" style="background: #4caf50; color: black; padding: 4px 8px; font-weight: bold; margin-right: 10px;">CREATIVE MODE</span>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script type="module" defer src="./Js/main.js"></script>
</body>
</html>
